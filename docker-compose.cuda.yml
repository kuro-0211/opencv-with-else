services:
  ros2_vision:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: ros2_vision:cuda
    container_name: ros2_vision
    restart: unless-stopped
    # GPU passthrough via the nvidia container runtime
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - VIDEO_PATH=/test_video.mp4
      - SHARED_DIR=/shared
      # FPS cap: "auto"=video fps, "0"/"max"=uncapped, "<n>"=that fps.
      # Disk writes stay throttled to WRITE_FPS so I/O isn't the bottleneck.
      - TARGET_FPS=60
      - WRITE_FPS=15
      # Video decode on GPU (NVDEC). Set to "cpu" to use OpenCV CPU decode.
      - DECODE_BACKEND=gpu
    volumes:
      - ./shared:/shared
      - ./test_video.mp4:/test_video.mp4:ro
      # WSL2 driver libs for NVDEC/NVENC (not auto-injected by the nvidia runtime
      # in WSL). Required by PyNvVideoCodec for GPU decoding.
      - /usr/lib/wsl/lib/libnvcuvid.so.1:/usr/lib/x86_64-linux-gnu/libnvcuvid.so.1:ro
      - /usr/lib/wsl/lib/libnvidia-encode.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:ro
    network_mode: host
