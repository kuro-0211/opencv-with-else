<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M7,0 L0,3 L7,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="700" fill="#f7f8fa"/>

  <text x="520" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Vision Monitoring System — 블럭도</text>
  <text x="520" y="53" text-anchor="middle" font-size="13" fill="#6b7280">ROS2(Docker · GPU) + Django(호스트) · 대시보드 데이터가 ROS2 토픽을 통과</text>

  <!-- mode_cmd return path (top) -->
  <polyline points="933,128 933,74 500,74 500,126" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="716" y="67" text-anchor="middle" font-size="11.5" fill="#475569">모드 전환 (docker exec) : 토픽 /mode_cmd · 서비스 /set_mode · 파라미터 mode</text>

  <!-- GPU -->
  <rect x="24" y="122" width="150" height="78" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="99" y="149" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">GPU</text>
  <text x="99" y="168" text-anchor="middle" font-size="12" fill="#166534">RTX 3080</text>
  <text x="99" y="185" text-anchor="middle" font-size="10.5" fill="#166534">NVDEC + CUDA (sm_86)</text>

  <!-- test video -->
  <rect x="24" y="250" width="150" height="70" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="99" y="279" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">test_video.mp4</text>
  <text x="99" y="298" text-anchor="middle" font-size="10.5" fill="#475569">H.264 · 보행자 영상</text>

  <!-- Container -->
  <rect x="196" y="92" width="404" height="508" rx="14" fill="#eff4ff" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="114" font-size="13" font-weight="700" fill="#1d4ed8">Docker · ros2_vision (ROS2 Jazzy)</text>

  <!-- vision_node -->
  <rect x="212" y="128" width="372" height="166" rx="10" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="228" y="153" font-size="15" font-weight="700" fill="#6d28d9">vision_node.py</text>
  <text x="228" y="181" font-size="12" fill="#4c1d95">① NVDEC 영상 디코딩 (PyNvVideoCodec)</text>
  <text x="228" y="205" font-size="12" fill="#4c1d95">② CUDA OpenCV : motion / edge / raw</text>
  <text x="228" y="229" font-size="12" fill="#4c1d95">③ 발행 : 메트릭 + Image + state</text>
  <text x="228" y="258" font-size="10.5" fill="#7c3aed">device=cuda · decode=nvdec · TARGET_FPS=60</text>

  <!-- topics bus -->
  <text x="398" y="312" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">ROS2 토픽</text>
  <line x1="330" y1="294" x2="330" y2="370" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="470" y1="294" x2="470" y2="370" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="300" y="333" text-anchor="middle" font-size="9.5" fill="#64748b">object_count · fps</text>
  <text x="300" y="346" text-anchor="middle" font-size="9.5" fill="#64748b">proc_time_ms · mode_state</text>
  <text x="492" y="333" text-anchor="middle" font-size="9.5" fill="#64748b">image_annotated</text>
  <text x="492" y="346" text-anchor="middle" font-size="9.5" fill="#64748b">state (JSON)</text>

  <!-- logger_node -->
  <rect x="212" y="372" width="178" height="196" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/>
  <text x="228" y="398" font-size="13.5" font-weight="700" fill="#0e7490">logger_node.py</text>
  <text x="228" y="424" font-size="11.5" fill="#155e75">메트릭 토픽 구독 →</text>
  <text x="228" y="442" font-size="11.5" fill="#155e75">detections.db (SQLite)</text>

  <!-- web_bridge_node -->
  <rect x="406" y="372" width="178" height="196" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
  <text x="422" y="398" font-size="13.5" font-weight="700" fill="#4338ca">web_bridge_node.py</text>
  <text x="422" y="424" font-size="11.5" fill="#3730a3">Image · state 구독 →</text>
  <text x="422" y="442" font-size="11.5" fill="#3730a3">./shared 파일 기록</text>
  <text x="422" y="470" font-size="10.5" fill="#6366f1">대시보드 데이터의</text>
  <text x="422" y="485" font-size="10.5" fill="#6366f1">ROS2 소비자</text>

  <!-- shared -->
  <rect x="648" y="150" width="168" height="240" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="732" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">공유 볼륨  ./shared</text>
  <rect x="664" y="194" width="136" height="44" rx="7" fill="#fff" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="732" y="221" text-anchor="middle" font-size="11.5" fill="#92400e">latest_frame.jpg</text>
  <rect x="664" y="248" width="136" height="44" rx="7" fill="#fff" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="732" y="275" text-anchor="middle" font-size="11.5" fill="#92400e">state.json</text>
  <rect x="664" y="302" width="136" height="44" rx="7" fill="#fff" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="732" y="329" text-anchor="middle" font-size="11.5" fill="#92400e">detections.db</text>

  <!-- Django -->
  <rect x="850" y="128" width="166" height="120" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="933" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Django (호스트)</text>
  <text x="933" y="182" text-anchor="middle" font-size="12" fill="#991b1b">config/ + monitor/</text>
  <text x="933" y="204" text-anchor="middle" font-size="12" fill="#991b1b">localhost:8000</text>
  <text x="933" y="226" text-anchor="middle" font-size="10.5" fill="#dc2626">REST API + 라이브 피드</text>

  <!-- Browser -->
  <rect x="850" y="300" width="166" height="92" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.8"/>
  <text x="933" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">브라우저</text>
  <text x="933" y="354" text-anchor="middle" font-size="12" fill="#475569">대시보드 UI</text>
  <text x="933" y="373" text-anchor="middle" font-size="12" fill="#475569">모드 전환 버튼</text>

  <!-- input arrows -->
  <line x1="174" y1="160" x2="210" y2="176" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="192" y="156" text-anchor="middle" font-size="10.5" fill="#475569">가속</text>
  <line x1="174" y1="284" x2="210" y2="252" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="192" y="286" text-anchor="middle" font-size="10.5" fill="#475569">입력</text>

  <!-- bridge -> shared (write frame/state) -->
  <path d="M584,430 C622,430 630,300 646,272" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="618" y="420" text-anchor="middle" font-size="10.5" fill="#475569">쓰기</text>

  <!-- logger -> shared (detections.db) via bottom route -->
  <polyline points="301,568 301,628 732,628 732,348" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="516" y="622" text-anchor="middle" font-size="10.5" fill="#475569">detections.db 기록</text>

  <!-- shared -> Django (read) -->
  <line x1="816" y1="212" x2="848" y2="186" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="832" y="184" text-anchor="middle" font-size="10.5" fill="#475569">읽기</text>

  <!-- Django <-> Browser -->
  <line x1="933" y1="248" x2="933" y2="300" stroke="#475569" stroke-width="1.6" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <text x="940" y="278" font-size="10.5" fill="#475569">HTTP</text>

  <!-- legend -->
  <text x="24" y="665" font-size="11" fill="#6b7280">— 실선: 데이터 흐름 · ─ ─ 점선: 모드 전환 제어 명령</text>
  <text x="24" y="684" font-size="11" fill="#6b7280">vision_node가 프레임·상태를 ROS2 토픽으로 발행 → logger/web_bridge 노드가 구독 → web_bridge가 ./shared에 기록 → Django가 대시보드 제공</text>
</svg>
